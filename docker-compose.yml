# ==============================================================================
# 🚀 THE GHAJINI VAULT: SELF-HOSTED MICRO-CLOUD
# Architecture: Debian 13 (Bare-Metal) + Docker + Tailscale Mesh
# Services: Immich (AI Photo Engine), Jellyfin (Media Transcoding)
# Deployment: Automated push-to-deploy via SSH post-receive hook
# ==============================================================================

name: dell-e-port

services:
  # ----------------------------------------------------------------------------
  # 📸 PHOTO CLOUD (IMMICH STACK)
  # ----------------------------------------------------------------------------
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      # ⚠️ OPTIONAL — your existing photo library for Immich to index (read-only)
      # Set EXTERNAL_LIBRARY_PATH in .env, or remove this line if you don't need it
      - ${EXTERNAL_LIBRARY_PATH}:/usr/src/app/external:ro
    env_file:
      - .env
    ports:
      - 2283:2283
    depends_on:
      - redis
      - database
    restart: unless-stopped

  redis:
    container_name: immich_redis
    image: redis:6.2-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped

  database:
    container_name: immich_postgres
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: postgres
      POSTGRES_DB: immich
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

#  immich-machine-learning:
#    container_name: immich_machine_learning
#    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}
#    volumes:
#      - immich-model-cache:/cache
#    env_file:
#      - .env
#    devices:
#      - /dev/dri/renderD129:/dev/dri/renderD128 # 🔥 AMD RADEON R5 M330 PASSTHROUGH
#    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # 🍿 MEDIA EMPIRE (JELLYFIN)
  # ----------------------------------------------------------------------------
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIMEZONE:-Asia/Kolkata}
    volumes:
      # ⚠️ Set these paths in .env or change to your actual media locations
      - ${JELLYFIN_MOVIES_PATH}:/data/movies
      - ${JELLYFIN_MUSIC_PATH}:/data/music
      - jellyfin_config:/config
    ports:
      - 8096:8096
    # ⚠️ HARDWARE SPECIFIC — remove the devices block if you don't have Intel QuickSync
    # Run: ls /dev/dri/ on your server to find your render device path
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128 # 🔥 INTEL QUICKSYNC GPU PASSTHROUGH
    restart: unless-stopped

# ------------------------------------------------------------------------------
# 💾 PERSISTENT STORAGE
# ------------------------------------------------------------------------------
volumes:
  pgdata:
  redis-data:
  jellyfin_config:
  immich-model-cache:
